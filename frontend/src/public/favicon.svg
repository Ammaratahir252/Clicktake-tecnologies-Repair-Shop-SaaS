<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#2563eb"/>
  
  <!-- Blue accent top -->
  <rect x="0" y="0" width="100" height="26" rx="22" fill="#1d4ed8"/>
  <rect x="0" y="14" width="100" height="12" fill="#1d4ed8"/>

  <!-- String dashed -->
  <line x1="50" y1="0" x2="50" y2="18" stroke="white" stroke-width="2" opacity="0.4" stroke-dasharray="3,2"/>

  <!-- Hole -->
  <circle cx="50" cy="18" r="7" fill="#2563eb"/>
  <circle cx="50" cy="18" r="7" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Tag card body -->
  <rect x="18" y="32" width="64" height="54" rx="10" fill="white" opacity="0.12"/>
  <rect x="18" y="32" width="64" height="54" rx="10" fill="none" stroke="white" stroke-width="1.8" opacity="0.55"/>

  <!-- Content lines -->
  <rect x="28" y="42" width="44" height="6" rx="3" fill="white" opacity="0.9"/>
  <rect x="28" y="55" width="30" height="6" rx="3" fill="white" opacity="0.55"/>
  <rect x="28" y="68" width="18" height="6" rx="3" fill="white" opacity="0.3"/>

  <!-- Tiny wrench bottom right -->
  <g transform="translate(72, 76) rotate(-45) scale(0.55)">
    <rect x="-5" y="-16" width="10" height="26" rx="5" fill="white" opacity="0.85"/>
    <rect x="-12" y="-22" width="24" height="12" rx="6" fill="white" opacity="0.85"/>
  </g>
</svg>